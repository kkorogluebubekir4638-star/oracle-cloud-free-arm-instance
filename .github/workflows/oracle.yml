name: Oracle Cloud Free ARM Instance

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install OCI CLI via PIP
        run: |
          pip install oci-cli
          echo "OCI CLI başarıyla kuruldu."

      - name: Configure OCI Environment Variables
        run: |
          # Scriptin compartment hatası vermemesi için gerekli çevre değişkenini sisteme kaydediyoruz
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_OCID }}" >> $GITHUB_ENV
          echo "TENANCY_ID=${{ secrets.OCI_TENANCY_OCID }}" >> $GITHUB_ENV

      - name: Run Oracle Creator Script
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          # Burası scriptin eksik bulduğu kimliği tamamlıyor:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          chmod +x oracle_cloud_instance_creator.sh
          ./oracle_cloud_instance_creator.sh
